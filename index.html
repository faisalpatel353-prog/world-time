<!DOCTYPE html>
<html>
<head>
<title>World Time Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.header{display:flex;justify-content:space-between;padding:15px;background:#111827}
.menu{cursor:pointer;font-size:22px}
.box{padding:15px}
input,select{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none}
.card{background:#1f2937;padding:12px;margin:10px 0;border-radius:8px}
.ads{background:#374151;text-align:center;padding:15px;margin:10px 0}
.country-list{max-height:200px;overflow-y:scroll}
.detail{background:#020617;padding:15px;margin-top:10px;border-radius:8px}
</style>
</head>

<body>

<div class="header">
<div>🌍 World Time Pro</div>
<div class="menu" onclick="toggleMenu()">☰</div>
</div>

<div id="menuBox" style="display:none;padding:15px;background:#1f2937;">
<h3>About Time</h3>
<p>
Time zones exist because Earth rotates 360° in 24 hours. Every 15° = 1 hour difference.
Countries adjust time based on longitude. India follows IST (UTC+5:30).
Daylight Saving Time (DST) is used in some countries to save daylight.
</p>
</div>

<div class="box">

<input type="text" id="search" placeholder="Search country..." onkeyup="filterCountry()">

<select id="country1"></select>

<div class="card" id="time"></div>

<div class="ads">Ad Space</div>

<div class="country-list" id="list"></div>

<div class="detail" id="detail"></div>

</div>

<script>

let zones = Intl.supportedValuesOf('timeZone')

function loadCountries(){
let c1 = document.getElementById("country1")
let list = document.getElementById("list")

zones.forEach(z=>{
let name = z.replace("_"," ")

c1.innerHTML += `<option value="${z}">${name}</option>`

list.innerHTML += `<div class="card" onclick="showDetail('${z}')">${name}</div>`
})
}

let userZone = Intl.DateTimeFormat().resolvedOptions().timeZone

function update(){
let zone = document.getElementById("country1").value
let t = new Date().toLocaleString("en-US",{timeZone:zone})
document.getElementById("time").innerHTML = "Current Time: "+t
}

function showDetail(zone){
let now = new Date().toLocaleString("en-US",{timeZone:zone})

let job = "9 AM to 5 PM (approx)"
let stock = "9:30 AM to 4 PM (local market)"

if(zone.includes("India")){
job = "9 AM to 6 PM"
stock = "9:15 AM to 3:30 PM (NSE/BSE)"
}

if(zone.includes("New_York")){
stock = "9:30 AM to 4 PM (NYSE)"
}

document.getElementById("detail").innerHTML = `
<h3>${zone}</h3>
<p><b>Current Time:</b> ${now}</p>
<p><b>Time Zone:</b> ${zone}</p>
<p><b>Corporate Job Timing:</b> ${job}</p>
<p><b>Stock Market Timing:</b> ${stock}</p>
`
}

function filterCountry(){
let input = document.getElementById("search").value.toLowerCase()
let cards = document.querySelectorAll(".country-list .card")

cards.forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(input) ? "" : "none"
})
}

function toggleMenu(){
let m = document.getElementById("menuBox")
m.style.display = m.style.display=="none"?"block":"none"
}

setInterval(update,1000)
loadCountries()

</script>

</body>
</html>
