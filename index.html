<!DOCTYPE html>
<html>
<head>
  <meta name="description" content="Compare world time zones easily. Check time difference between countries instantly. Free world clock tool.">
<meta name="keywords" content="world time, time compare, timezone converter, india vs usa time, world clock">
<title>World Time Compare</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
padding:20px;
}

.box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

select,input{
padding:12px;
width:100%;
margin:10px 0;
border:none;
border-radius:8px;
}

.time{
font-size:18px;
margin:10px 0;
padding:10px;
background:rgba(255,255,255,0.15);
border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>🌍 World Time Compare</h2>

<input type="text" id="search" placeholder="Search country..." onkeyup="filterCountry()">

<select id="country">

<!-- USA -->
<option value="America/New_York">USA (New York)</option>
<option value="America/Los_Angeles">USA (California)</option>
<option value="America/Chicago">USA (Chicago)</option>
<option value="America/Denver">USA (Denver)</option>

<!-- Europe -->
<option value="Europe/London">UK</option>
<option value="Europe/Paris">France</option>
<option value="Europe/Berlin">Germany</option>
<option value="Europe/Madrid">Spain</option>
<option value="Europe/Rome">Italy</option>
<option value="Europe/Amsterdam">Netherlands</option>
<option value="Europe/Zurich">Switzerland</option>
<option value="Europe/Stockholm">Sweden</option>
<option value="Europe/Oslo">Norway</option>
<option value="Europe/Helsinki">Finland</option>
<option value="Europe/Warsaw">Poland</option>
<option value="Europe/Prague">Czech Republic</option>
<option value="Europe/Vienna">Austria</option>
<option value="Europe/Budapest">Hungary</option>
<option value="Europe/Moscow">Russia</option>
<option value="Europe/Istanbul">Turkey</option>
<option value="Europe/Athens">Greece</option>
<option value="Europe/Dublin">Ireland</option>

<!-- Asia -->
<option value="Asia/Kolkata">India</option>
<option value="Asia/Dubai">UAE</option>
<option value="Asia/Riyadh">Saudi Arabia</option>
<option value="Asia/Karachi">Pakistan</option>
<option value="Asia/Dhaka">Bangladesh</option>
<option value="Asia/Kathmandu">Nepal</option>
<option value="Asia/Colombo">Sri Lanka</option>
<option value="Asia/Singapore">Singapore</option>
<option value="Asia/Kuala_Lumpur">Malaysia</option>
<option value="Asia/Bangkok">Thailand</option>
<option value="Asia/Jakarta">Indonesia</option>
<option value="Asia/Tokyo">Japan</option>
<option value="Asia/Seoul">South Korea</option>
<option value="Asia/Shanghai">China</option>
<option value="Asia/Hong_Kong">Hong Kong</option>
<option value="Asia/Taipei">Taiwan</option>
<option value="Asia/Manila">Philippines</option>
<option value="Asia/Tehran">Iran</option>
<option value="Asia/Baghdad">Iraq</option>
<option value="Asia/Jerusalem">Israel</option>

<!-- Africa -->
<option value="Africa/Cairo">Egypt</option>
<option value="Africa/Nairobi">Kenya</option>
<option value="Africa/Lagos">Nigeria</option>
<option value="Africa/Accra">Ghana</option>
<option value="Africa/Johannesburg">South Africa</option>
<option value="Africa/Algiers">Algeria</option>
<option value="Africa/Casablanca">Morocco</option>
<option value="Africa/Tunis">Tunisia</option>

<!-- Americas -->
<option value="America/Toronto">Canada</option>
<option value="America/Vancouver">Canada Vancouver</option>
<option value="America/Sao_Paulo">Brazil</option>
<option value="America/Rio_Branco">Brazil West</option>
<option value="America/Mexico_City">Mexico</option>
<option value="America/Buenos_Aires">Argentina</option>
<option value="America/Santiago">Chile</option>
<option value="America/Lima">Peru</option>
<option value="America/Bogota">Colombia</option>

<!-- Oceania -->
<option value="Australia/Sydney">Australia</option>
<option value="Australia/Melbourne">Australia Melbourne</option>
<option value="Australia/Perth">Australia Perth</option>
<option value="Pacific/Auckland">New Zealand</option>
<option value="Pacific/Fiji">Fiji</option>
<option value="Pacific/Honolulu">Hawaii</option>

</select>

<div class="time" id="your"></div>
<div class="time" id="other"></div>
<div class="time" id="diff"></div>

</div>

<script>
let userZone = Intl.DateTimeFormat().resolvedOptions().timeZone

function update(){
let yourTime = new Date().toLocaleString("en-US",{timeZone:userZone})
let country = document.getElementById("country").value
let other = new Date().toLocaleString("en-US",{timeZone:country})

document.getElementById("your").innerHTML = "🕒 Your Time: " + yourTime
document.getElementById("other").innerHTML = "🌎 Other Time: " + other

let y = new Date(yourTime)
let o = new Date(other)

let diff = (o - y) / 3600000

let text = ""

if(diff > 0){
text = "⏩ " + diff.toFixed(1) + " hours ahead of you"
}
else if(diff < 0){
text = "⏪ " + Math.abs(diff).toFixed(1) + " hours behind you"
}
else{
text = "⏺ Same time"
}

document.getElementById("diff").innerHTML = text
}

setInterval(update,1000)

function filterCountry(){
let input = document.getElementById("search").value.toLowerCase()
let select = document.getElementById("country")
let options = select.getElementsByTagName("option")

for(let i=0;i<options.length;i++){
let txt = options[i].text.toLowerCase()
options[i].style.display = txt.includes(input) ? "" : "none"
}
}
</script>

</body>
</html>
