<!DOCTYPE html>
<html>
<head>
<title>World Time Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111827;
}

.menu{
cursor:pointer;
font-size:22px;
}

.box{
padding:15px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

.card{
background:#1f2937;
padding:12px;
margin:10px 0;
border-radius:8px;
}

.ads{
background:#374151;
text-align:center;
padding:15px;
margin:10px 0;
}

.country-list{
max-height:200px;
overflow-y:scroll;
}
</style>
</head>

<body>

<div class="header">
<div>🌍 World Time Pro</div>
<div class="menu" onclick="toggleMenu()">☰</div>
</div>

<div id="menuBox" style="display:none;padding:15px;background:#1f2937;">
<h3>About Time</h3>
<p>
Time zones exist because Earth rotates. Different countries have different time
based on longitude. India uses IST (UTC+5:30).
</p>
</div>

<div class="box">

<input type="text" id="search" placeholder="Search country..." onkeyup="filterCountry()">

<select id="country1"></select>
<select id="country2"></select>

<div class="card" id="your"></div>
<div class="card" id="c1"></div>
<div class="card" id="c2"></div>
<div class="card" id="diff"></div>

<div class="ads">Ad Space</div>

<div class="country-list" id="list"></div>

</div>

<script>

let zones = Intl.supportedValuesOf('timeZone')

function loadCountries(){
let c1 = document.getElementById("country1")
let c2 = document.getElementById("country2")
let list = document.getElementById("list")

zones.forEach(z=>{
let name = z.replace("_"," ")

c1.innerHTML += `<option value="${z}">${name}</option>`
c2.innerHTML += `<option value="${z}">${name}</option>`

list.innerHTML += `<div class="card">${name}</div>`
})
}

let userZone = Intl.DateTimeFormat().resolvedOptions().timeZone

function update(){
let yourTime = new Date().toLocaleString("en-US",{timeZone:userZone})
let z1 = document.getElementById("country1").value
let z2 = document.getElementById("country2").value

let t1 = new Date().toLocaleString("en-US",{timeZone:z1})
let t2 = new Date().toLocaleString("en-US",{timeZone:z2})

document.getElementById("your").innerHTML = "Your Time: "+yourTime
document.getElementById("c1").innerHTML = "Country 1: "+t1
document.getElementById("c2").innerHTML = "Country 2: "+t2

let d1 = new Date(t1)
let d2 = new Date(t2)

let diff = (d2 - d1)/3600000

document.getElementById("diff").innerHTML =
diff>0 ? diff.toFixed(1)+" hours ahead" :
diff<0 ? Math.abs(diff).toFixed(1)+" hours behind" :
"Same time"
}

function filterCountry(){
let input = document.getElementById("search").value.toLowerCase()
let options = document.querySelectorAll("option")

options.forEach(o=>{
o.style.display = o.text.toLowerCase().includes(input) ? "" : "none"
})
}

function toggleMenu(){
let m = document.getElementById("menuBox")
m.style.display = m.style.display=="none"?"block":"none"
}

setInterval(update,1000)
loadCountries()

</script>

</body>
</html>
